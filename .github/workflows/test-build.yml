name: Test compiling arduino code

on:
  # Runs on all branches but main, when a arduino file is changed
  push:
    branches-ignore: ["main"]
    paths:
      - "**.ino"
      - "**.h"
      - "**.yml"

  # Runs on PRs targeting main when relevant files change
  pull_request:
    branches: ["main"]
    paths:
      - "**.ino"
      - "**.h"
      - "**.yml"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

concurrency:
  group: test-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio==6.1.18

      #Build CYD
      - name: Build CYD
        run: platformio run -e cyd

      #Build CYD2USB
      - name: Build CYD2USB
        run: platformio run -e cyd2usb

      #Build Matrix
      - name: Build Matrix
        run: platformio run -e trinity
